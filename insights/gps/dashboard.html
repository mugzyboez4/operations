<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>artistGPS — Full Roster Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#0F0E0E;--card:#1A1A1A;--card-hover:#222;--text:#FCFDF8;--sub:#B0A9BE;--mute:#666;
--chartreuse:#CDF851;--flame:#FF4A23;--teal:#5BC0BE;--purple:#7F77DD;--slate:#3E3F41;
--fog:#B0A9BE;--green-dark:#24693d;--green-mid:#45924e;--green-light:#73ba67;
--gray:#d4d4d4;--orange:#f8816b;--red:#e33f43;--red-dark:#ae123a;
}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:13px;line-height:1.5}
input,select,button{font-family:inherit}

/* ── Header ── */
.header{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid #2a2a2a;padding:12px 24px;display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.logo{font-weight:900;font-size:14px;letter-spacing:2px;color:var(--chartreuse)}
.header-title{font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--sub)}
.header-right{margin-left:auto;display:flex;align-items:center;gap:8px;font-size:11px;color:var(--mute);font-family:'DM Mono',monospace}
.badge{background:var(--card);padding:3px 8px;font-size:10px;font-family:'DM Mono',monospace;color:var(--chartreuse);letter-spacing:1px}

/* ── Controls ── */
.controls{padding:16px 24px;display:flex;gap:12px;flex-wrap:wrap;align-items:center;border-bottom:1px solid #1e1e1e}
.search{background:var(--card);border:1px solid #2a2a2a;color:var(--text);padding:8px 14px;width:280px;font-size:13px;outline:none;transition:border-color .2s}
.search:focus{border-color:var(--chartreuse)}
.search::placeholder{color:var(--mute)}
select{background:var(--card);border:1px solid #2a2a2a;color:var(--text);padding:8px 12px;font-size:12px;cursor:pointer;outline:none}
select:focus{border-color:var(--chartreuse)}
.toggle{display:flex;gap:0}
.toggle button{background:var(--card);border:1px solid #2a2a2a;color:var(--sub);padding:6px 14px;font-size:11px;font-weight:600;cursor:pointer;letter-spacing:.5px;transition:all .15s}
.toggle button:first-child{border-right:none}
.toggle button:last-child{border-left:none}
.toggle button.active{background:var(--chartreuse);color:var(--bg);border-color:var(--chartreuse)}
.count{font-size:11px;color:var(--mute);font-family:'DM Mono',monospace;margin-left:auto}

/* ── Summary strip ── */
.summary{padding:12px 24px;display:flex;gap:24px;border-bottom:1px solid #1e1e1e;flex-wrap:wrap}
.sum-item{display:flex;align-items:baseline;gap:6px}
.sum-label{font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--mute)}
.sum-val{font-size:16px;font-weight:700;font-family:'DM Mono',monospace;color:var(--chartreuse)}

/* ── Table ── */
.table-wrap{overflow-x:auto;padding:0 24px}
table{width:100%;border-collapse:collapse;min-width:1100px}
th{position:sticky;top:50px;background:var(--bg);text-align:left;padding:10px 8px;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--sub);border-bottom:2px solid var(--chartreuse);cursor:pointer;user-select:none;white-space:nowrap;transition:color .15s}
th:hover{color:var(--chartreuse)}
th .arrow{font-size:8px;margin-left:4px;opacity:.4}
th.sorted .arrow{opacity:1;color:var(--chartreuse)}
td{padding:8px;border-bottom:1px solid #1a1a1a;font-size:12px;white-space:nowrap}
tr{transition:background .1s}
tr:hover td{background:var(--card-hover)}
tr.expanded td{background:var(--card);border-bottom-color:var(--card)}

.artist-name{font-weight:600;color:var(--text);cursor:pointer;transition:color .15s}
.artist-name:hover{color:var(--chartreuse)}
.genre-tag{font-size:10px;padding:2px 6px;background:var(--card);color:var(--sub);letter-spacing:.5px}
.sony-dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:4px}
.sony-dot.y{background:var(--chartreuse)}.sony-dot.n{background:var(--slate)}

.pctile{font-weight:700;font-family:'DM Mono',monospace;font-size:12px}
.score{font-weight:700;font-family:'DM Mono',monospace}
.rating-badge{font-size:10px;font-weight:600;padding:2px 6px;letter-spacing:.5px}
.na{color:var(--mute);font-style:italic;font-size:11px}

/* ── Detail panel ── */
.detail-row td{padding:0 !important;border-bottom:1px solid #2a2a2a}
.detail{background:var(--card);padding:20px 24px;display:none}
.detail.open{display:block}
.detail-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.detail-kpi{padding:10px;border-left:3px solid var(--slate)}
.detail-kpi-label{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--mute);margin-bottom:2px}
.detail-kpi-val{font-size:18px;font-weight:700;font-family:'DM Mono',monospace}
.detail-kpi-sub{font-size:10px;font-family:'DM Mono',monospace;margin-top:2px}

/* ── Footer ── */
.footer{padding:24px;text-align:center;font-size:10px;color:var(--mute);letter-spacing:1px;text-transform:uppercase;margin-top:40px;border-top:1px solid #1e1e1e}

/* ── Histo ── */
.histo-wrap{padding:16px 24px;border-bottom:1px solid #1e1e1e}
.histo-title{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--sub);margin-bottom:8px}
.histo{display:flex;align-items:flex-end;gap:2px;height:60px}
.histo-bar{flex:1;background:var(--slate);transition:background .15s;position:relative;min-width:4px;cursor:default}
.histo-bar:hover{opacity:.8}
.histo-labels{display:flex;justify-content:space-between;font-size:9px;color:var(--mute);font-family:'DM Mono',monospace;margin-top:4px}

@media(max-width:768px){
.controls{flex-direction:column;align-items:stretch}
.search{width:100%}
.count{margin-left:0;margin-top:8px}
}
</style>
</head>
<body>
<script>
// Password gate — injected at top of each GPS page
(function(){
  const HASH = 'aca649258462260c79e63076444dc8f1fa9d255620ba43ef16be7cd4813eb636';
  const KEY = 'gps_auth';
  
  if (sessionStorage.getItem(KEY) === 'true') return;
  
  document.documentElement.style.overflow = 'hidden';
  const gate = document.createElement('div');
  gate.id = 'pw-gate';
  gate.innerHTML = `
    <div style="position:fixed;inset:0;background:#0F0E0E;z-index:99999;display:flex;align-items:center;justify-content:center;font-family:Inter,sans-serif">
      <div style="text-align:center;max-width:360px;padding:24px">
        <div style="font-size:14px;font-weight:900;letter-spacing:2px;color:#CDF851;margin-bottom:4px">RCA</div>
        <div style="font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:#B0A9BE;margin-bottom:32px">artistGPS · Restricted Access</div>
        <input id="pw-input" type="password" placeholder="Password" autofocus
          style="width:100%;background:#1A1A1A;border:1px solid #2a2a2a;color:#FCFDF8;padding:12px 16px;font-size:14px;font-family:Inter,sans-serif;outline:none;margin-bottom:12px;text-align:center;letter-spacing:2px">
        <div id="pw-err" style="font-size:11px;color:#e33f43;min-height:20px;margin-bottom:8px"></div>
        <div style="font-size:10px;color:#666;margin-top:16px">Internal Use Only · Campaign Operations</div>
      </div>
    </div>`;
  document.body.prepend(gate);
  
  async function check(pw) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw));
    const hex = [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');
    return hex === HASH;
  }
  
  const inp = document.getElementById('pw-input');
  inp.addEventListener('keydown', async(e) => {
    if (e.key !== 'Enter') return;
    if (await check(inp.value)) {
      sessionStorage.setItem(KEY, 'true');
      gate.remove();
      document.documentElement.style.overflow = '';
    } else {
      document.getElementById('pw-err').textContent = 'Incorrect password';
      inp.value = '';
    }
  });
})();

</script>

];

  {key:'lean_forward_pct_pctile', label:'LF%', sortable:true, type:'pctile'},
  {key:'lf_streams_per_listener_pctile', label:'LF/U', sortable:true, type:'pctile'},

function pColor(p) {
  if (p===null||p===undefined) return 'var(--mute)';
  if (p>=90) return 'var(--green-dark)';
  if (p>=80) return 'var(--green-mid)';
  if (p>=70) return 'var(--green-light)';
  if (p>=60) return 'var(--gray)';
  if (p>=40) return 'var(--gray)';
  if (p>=30) return 'var(--orange)';
  if (p>=20) return 'var(--red)';
  return 'var(--red-dark)';
}

function fmtPctile(v) {
  if (v===null||v===undefined) return '<span class="na">—</span>';
  return `<span class="pctile" style="color:${pColor(v)}">${Math.round(v)}</span>`;
}

function fmtVal(v, type) {
  if (v===null||v===undefined) return '<span class="na">—</span>';
  if (type==='pct') return (v*100).toFixed(1)+'%';
  if (type==='age') return v.toFixed(1);
  if (type==='dec') return v.toFixed(2);
  return v.toFixed(1);
}

let sortCol = 'overall_percentile', sortDir = -1;
let expanded = null;

// Populate genre filter
const genres = [...new Set(DATA.map(d=>d.parent_genre).filter(Boolean))].sort();
const gf = document.getElementById('genreFilter');
genres.forEach(g => { const o = document.createElement('option'); o.value=g; o.textContent=g; gf.appendChild(o); });

// Sony toggle
document.querySelectorAll('#sonyToggle button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#sonyToggle button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    render();
  });
});

function getFiltered() {
  const q = document.getElementById('search').value.toLowerCase();
  const genre = gf.value;
  const sony = document.querySelector('#sonyToggle button.active').dataset.val;
  const rat = document.getElementById('ratingFilter').value;
  
  return DATA.filter(d => {
    if (q && !d.artist_name_rollup.toLowerCase().includes(q)) return false;
    if (genre && d.parent_genre !== genre) return false;
    if (sony && d.sony_flag !== sony) return false;
    if (rat && d.overall_rating !== rat) return false;
    return true;
  });
}

function render() {
  const filtered = getFiltered();
  
  // Sort
  filtered.sort((a,b) => {
    let av = a[sortCol], bv = b[sortCol];
    if (av===null||av===undefined) av = sortDir>0 ? Infinity : -Infinity;
    if (bv===null||bv===undefined) bv = sortDir>0 ? Infinity : -Infinity;
    if (typeof av === 'string') return sortDir * av.localeCompare(bv);
    return sortDir * (av - bv);
  });
  
  // Count
  document.getElementById('count').textContent = `${filtered.length} / ${DATA.length} artists`;
  
  // Summary
  const scored = filtered.filter(d=>d.normalized_score!==null);
  const avg = scored.length ? (scored.reduce((s,d)=>s+d.normalized_score,0)/scored.length) : 0;
  const med = scored.length ? scored.map(d=>d.normalized_score).sort((a,b)=>a-b)[Math.floor(scored.length/2)] : 0;
  const sonyN = filtered.filter(d=>d.sony_flag==='Y').length;
  document.getElementById('summary').innerHTML = `
    <div class="sum-item"><span class="sum-label">Showing</span><span class="sum-val">${filtered.length}</span></div>
    <div class="sum-item"><span class="sum-label">Mean Score</span><span class="sum-val">${avg.toFixed(1)}</span></div>
    <div class="sum-item"><span class="sum-label">Median</span><span class="sum-val">${med.toFixed(1)}</span></div>
    <div class="sum-item"><span class="sum-label">Sony</span><span class="sum-val">${sonyN}</span></div>
    <div class="sum-item"><span class="sum-label">Non-Sony</span><span class="sum-val">${filtered.length-sonyN}</span></div>
  `;
  
  // Histogram
  const bins = new Array(20).fill(0);
  scored.forEach(d => {
    const b = Math.min(Math.floor(d.normalized_score / 5), 19);
    bins[b]++;
  });
  const maxBin = Math.max(...bins, 1);
  document.getElementById('histo').innerHTML = bins.map((c,i) => {
    const h = (c/maxBin)*100;
    const mid = i*5+2.5;
    const col = pColor(mid);
    return `<div class="histo-bar" style="height:${Math.max(h,2)}%;background:${col}" title="${i*5}-${i*5+5}: ${c} artists"></div>`;
  }).join('');
  
  // Table header
  const allCols = [...COLS, ...SONY_COLS];
  document.getElementById('thead').innerHTML = '<tr>' + allCols.map(c => {
    const sorted = c.key === sortCol;
    const arrow = sorted ? (sortDir>0?'▲':'▼') : '▲';
    return `<th class="${sorted?'sorted':''}" data-key="${c.key}" ${c.width?'style="width:'+c.width+'"':''}>${c.label} <span class="arrow">${arrow}</span></th>`;
  }).join('') + '</tr>';
  
  // Table body
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  
  filtered.forEach((d, idx) => {
    const tr = document.createElement('tr');
    tr.innerHTML = allCols.map(c => {
      const v = d[c.key];
      if (c.type==='text' && c.key==='artist_name_rollup') {
        return `<td><span class="artist-name" data-idx="${idx}">${v}</span></td>`;
      }
      if (c.type==='flag') {
        return `<td><span class="sony-dot ${(v||'').toLowerCase()}"></span></td>`;
      }
      if (c.type==='text') {
        return `<td><span class="genre-tag">${v||''}</span></td>`;
      }
      if (c.type==='pctile') return `<td>${fmtPctile(v)}</td>`;
      if (c.type==='rating') {
        if (!v) return '<td><span class="na">—</span></td>';
        const p = d.overall_percentile;
        return `<td><span class="rating-badge" style="color:${pColor(p)}">${v}</span></td>`;
      }
      if (c.type==='score') {
        if (v===null||v===undefined) return '<td><span class="na">—</span></td>';
        return `<td><span class="score" style="color:${pColor(d.overall_percentile)}">${v.toFixed(1)}</span></td>`;
      }
      if (c.type==='num') {
        if (v===null||v===undefined) return '<td><span class="na">—</span></td>';
        return `<td style="font-family:DM Mono;font-size:11px">${v}</td>`;
      }
      return `<td>${v||''}</td>`;
    }).join('');
    tbody.appendChild(tr);
    
    // Detail row
    const dtr = document.createElement('tr');
    dtr.className = 'detail-row';
    const dtd = document.createElement('td');
    dtd.colSpan = allCols.length;
    
    const kpis = [
      {label:'Catalog Momentum', val:d.catalog_growth_rate, pct:d.catalog_momentum_pctile, fmt:'pct'},
      {label:'Release Momentum', val:d.release_momentum_avg_pct_change, pct:d.release_momentum_pctile, fmt:'pct'},
      {label:'IG 1M Growth', val:d.instagram_1m_growth_rate, pct:d.ig_growth_pctile, fmt:'pct'},
      {label:'TikTok 1M Growth', val:d.tiktok_1m_growth_rate, pct:d.tiktok_growth_pctile, fmt:'pct'},
      {label:'IG Engagement Rate', val:d.ig_engagement_rate, pct:d.ig_engagement_pctile, fmt:'pct'},
      {label:'TikTok Like/View', val:d.tiktok_like_to_view_ratio, pct:d.tiktok_engagement_pctile, fmt:'pct'},
      {label:'Lean Forward %', val:d['lean_forward_%'], pct:d.lean_forward_pct_pctile, fmt:'pct'},
      {label:'LF Streams/User', val:d.lf_streams_per_listener, pct:d.lf_streams_per_listener_pctile, fmt:'dec'},
      {label:'Core Streaming Age', val:d.core_streaming_age, pct:d.core_streaming_age_pctile, fmt:'age'},
      {label:'Core Socials Age', val:d.core_socials_age, pct:d.core_socials_age_pctile, fmt:'age'},
    ];
    
    dtd.innerHTML = `<div class="detail" id="detail-${idx}">
      <div class="detail-grid">
        ${kpis.map(k => {
          if (k.val===null&&k.pct===null) return '';
          const color = pColor(k.pct);
          return `<div class="detail-kpi" style="border-color:${color}">
            <div class="detail-kpi-label">${k.label}</div>
            <div class="detail-kpi-val" style="color:${color}">${fmtVal(k.val, k.fmt)}</div>
            <div class="detail-kpi-sub" style="color:${color}">P${k.pct!==null?Math.round(k.pct):'—'}</div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
    dtr.appendChild(dtd);
    tbody.appendChild(dtr);
  });
  
  // Click handlers for artist names
  tbody.querySelectorAll('.artist-name').forEach(el => {
    el.addEventListener('click', () => {
      const idx = el.dataset.idx;
      const det = document.getElementById('detail-'+idx);
      if (expanded && expanded !== det) {
        expanded.classList.remove('open');
        expanded.closest('tr').previousElementSibling.classList.remove('expanded');
      }
      det.classList.toggle('open');
      det.closest('tr').previousElementSibling.classList.toggle('expanded');
      expanded = det.classList.contains('open') ? det : null;
    });
  });
}

// Sort handlers
document.getElementById('thead').addEventListener('click', e => {
  const th = e.target.closest('th');
  if (!th) return;
  const key = th.dataset.key;
  if (sortCol === key) sortDir *= -1;
  else { sortCol = key; sortDir = -1; }
  render();
});

// Filter handlers
document.getElementById('search').addEventListener('input', render);
document.getElementById('genreFilter').addEventListener('change', render);
document.getElementById('ratingFilter').addEventListener('change', render);

render();
</script>
</body>
</html>
