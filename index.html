<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campaign Operations</title>
<link rel="icon" type="image/png" href="/tempoicon.png">
<meta name="robots" content="noindex, nofollow">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    font-family: 'Inter', -apple-system, sans-serif;
    background: #F5F4EC;
    color: #0F0E0E;
    -webkit-font-smoothing: antialiased;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .wrap {
    text-align: center;
    max-width: 420px;
  }
  .eye {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #6B6776;
    margin-bottom: 14px;
  }
  h1 {
    font-size: 32px;
    font-weight: 900;
    letter-spacing: -0.02em;
    line-height: 1.05;
    text-transform: uppercase;
    margin-bottom: 18px;
  }
  h1 .accent { background: #CDF851; padding: 0 6px; }
  p {
    font-size: 13px;
    color: #6B6776;
    line-height: 1.5;
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="eye">RCA Records &middot; Internal</div>
    <h1>Campaign <span class="accent">Ops</span></h1>
    <p>Internal tooling. Access via direct URL only.</p>
  </div>
</body>
</html>
