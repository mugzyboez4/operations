<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Action Items Board — Campaign Ops</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0A0A0A;--surface:#111;--card:#161616;--border:#222;
  --text:#FCFDF8;--dim:#B0A9BE;--fog:#847D96;--muted:#3E3F41;
  --chartreuse:#CDF851;--teal:#5BC0BE;--flame:#FF4A23;--gold:#E8C547;--lavender:#A78BFA;
  --green-bg:rgba(205,248,81,0.08);--teal-bg:rgba(91,192,190,0.08);
  --flame-bg:rgba(255,74,35,0.08);--gold-bg:rgba(232,197,71,0.08);--lavender-bg:rgba(167,139,250,0.08);
}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased}

/* HEADER */
.header{max-width:1400px;margin:0 auto;padding:32px 24px 16px}
.header-tag{font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--chartreuse);margin-bottom:6px}
.header h1{font-size:28px;font-weight:900;letter-spacing:-0.5px;color:var(--text)}
.header h1 span{color:var(--chartreuse)}
.header-sub{font-size:12px;color:var(--fog);margin-top:4px}

/* CONTROLS */
.controls{max-width:1400px;margin:0 auto;padding:8px 24px 16px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.filter-group{display:flex;gap:4px;flex-wrap:wrap}
.filter-label{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--fog);padding:6px 8px;align-self:center}
.pill{font-size:11px;font-weight:600;padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--fog);cursor:pointer;transition:all .15s;white-space:nowrap}
.pill:hover{border-color:var(--dim);color:var(--dim)}
.pill.active{background:var(--chartreuse);color:var(--bg);border-color:var(--chartreuse)}
.pill.active-type-action{background:var(--teal);color:var(--bg);border-color:var(--teal)}
.pill.active-type-escalation{background:var(--flame);color:#fff;border-color:var(--flame)}
.pill.active-type-signal{background:var(--gold);color:var(--bg);border-color:var(--gold)}
.pill.active-type-carry{background:var(--lavender);color:var(--bg);border-color:var(--lavender)}
.pill.active-type-discussed{background:var(--chartreuse);color:var(--bg);border-color:var(--chartreuse)}
.spacer{flex:1}
.export-btn{font-size:11px;font-weight:700;padding:6px 14px;border-radius:4px;border:1px solid var(--chartreuse);background:transparent;color:var(--chartreuse);cursor:pointer;transition:all .15s;letter-spacing:0.5px}
.export-btn:hover{background:var(--chartreuse);color:var(--bg)}

/* STATS */
.stats{max-width:1400px;margin:0 auto;padding:0 24px 16px;display:flex;gap:16px;flex-wrap:wrap}
.stat{font-size:11px;color:var(--fog)}
.stat strong{font-weight:800;font-size:16px;margin-right:3px}
.stat.s-total strong{color:var(--text)}
.stat.s-action strong{color:var(--teal)}
.stat.s-esc strong{color:var(--flame)}
.stat.s-signal strong{color:var(--gold)}
.stat.s-carry strong{color:var(--lavender)}
.stat.s-decided strong{color:var(--chartreuse)}
.stat.s-open strong{color:#FF6B35}
.stat.s-complete strong{color:#2E7D32}

/* TABLE */
.table-wrap{max-width:1400px;margin:0 auto;padding:0 24px 40px;overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:900px}
thead th{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--fog);padding:10px 12px;border-bottom:2px solid var(--border);text-align:left;position:sticky;top:0;background:var(--bg);z-index:10;cursor:pointer;white-space:nowrap;user-select:none}
thead th:hover{color:var(--text)}
thead th .sort-arrow{margin-left:4px;font-size:8px;opacity:0.4}
thead th.sorted .sort-arrow{opacity:1;color:var(--chartreuse)}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
tbody tr:hover{background:rgba(255,255,255,0.02)}
tbody td{padding:8px 12px;vertical-align:top;font-size:12px;color:var(--dim);line-height:1.5}
tbody td.col-action{color:var(--text);font-weight:400;max-width:400px}
tbody td[contenteditable]{outline:none;border-radius:2px}
tbody td[contenteditable]:focus{background:rgba(205,248,81,0.05);box-shadow:inset 0 0 0 1px rgba(205,248,81,0.2)}

/* TYPE BADGE */
.type-badge{display:inline-block;font-size:9px;font-weight:800;letter-spacing:1px;text-transform:uppercase;padding:2px 8px;border-radius:3px;white-space:nowrap}
.type-decided{background:var(--green-bg);color:var(--chartreuse);border:1px solid rgba(205,248,81,0.2)}
.type-action{background:var(--teal-bg);color:var(--teal);border:1px solid rgba(91,192,190,0.2)}
.type-escalation{background:var(--flame-bg);color:var(--flame);border:1px solid rgba(255,74,35,0.2)}
.type-signal{background:var(--gold-bg);color:var(--gold);border:1px solid rgba(232,197,71,0.2)}
.type-carry{background:var(--lavender-bg);color:var(--lavender);border:1px solid rgba(167,139,250,0.2)}

/* STATUS */
.status-badge{font-size:10px;font-weight:700;letter-spacing:0.5px}
.status-open{color:#FF6B35}
.status-progress{color:var(--teal)}
.status-complete{color:#4CAF50}
.status-done{color:#4CAF50}

/* URGENCY */
.urg{font-size:9px;font-weight:800;letter-spacing:1px;text-transform:uppercase;padding:1px 6px;border-radius:2px}
.urg-asap{background:rgba(255,74,35,0.15);color:var(--flame)}
.urg-week{background:rgba(91,192,190,0.1);color:var(--teal)}
.urg-ongoing{background:rgba(167,139,250,0.1);color:var(--lavender)}

/* INLINE EDIT */
.edit-select{background:var(--card);border:1px solid var(--border);color:var(--text);font-family:'Inter',sans-serif;font-size:11px;padding:2px 4px;border-radius:3px;cursor:pointer}
.edit-select:focus{border-color:var(--chartreuse);outline:none}

/* EXPORT MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;justify-content:center;align-items:center}
.modal-overlay.show{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:8px;width:90%;max-width:600px;max-height:80vh;overflow:auto;padding:24px}
.modal h2{font-size:16px;font-weight:800;margin-bottom:16px}
.modal pre{background:var(--bg);border:1px solid var(--border);padding:16px;font-size:11px;line-height:1.6;overflow:auto;max-height:400px;color:var(--dim);border-radius:4px;white-space:pre-wrap}
.modal-actions{display:flex;gap:8px;margin-top:16px}
.modal-btn{font-size:11px;font-weight:700;padding:8px 16px;border-radius:4px;border:none;cursor:pointer;transition:all .15s}
.modal-btn.primary{background:var(--chartreuse);color:var(--bg)}
.modal-btn.primary:hover{opacity:0.9}
.modal-btn.secondary{background:transparent;border:1px solid var(--border);color:var(--fog)}
.modal-btn.secondary:hover{border-color:var(--dim);color:var(--text)}

/* ADD ROW */
.add-row-wrap{max-width:1400px;margin:0 auto;padding:0 24px 24px}
.add-row-btn{font-size:11px;font-weight:700;padding:8px 16px;border-radius:4px;border:1px dashed var(--border);background:transparent;color:var(--fog);cursor:pointer;transition:all .15s;width:100%;text-align:center}
.add-row-btn:hover{border-color:var(--chartreuse);color:var(--chartreuse)}

.footer{max-width:1400px;margin:0 auto;padding:16px 24px;font-size:10px;color:var(--muted);border-top:1px solid var(--border);letter-spacing:0.5px}

/* Row coloring by type */
tr.row-escalation{background:rgba(255,74,35,0.03)}
tr.row-carry{background:rgba(167,139,250,0.03)}
</style>
</head>

const TYPE_MAP = {
  'Discussed in the Room':'decided','Action':'action','Escalation':'escalation','Signal':'signal','Carry-Forward':'carry'
};
const STATUS_MAP = {'Open':'open','In Progress':'progress','Complete':'complete','Done':'done'};

let items = DATA.map((d,i)=>({...d, _id:i}));
let filters = {type:null, status:null, cl:null, artist:null};
let sortCol = null, sortDir = 'asc';
let modalData = {content:'',filename:''};

function getFilteredItems(){
  return items.filter(it=>{
    if(filters.type && it.type !== filters.type) return false;
    if(filters.status && it.status !== filters.status) return false;
    if(filters.cl && it.cl !== filters.cl) return false;
    if(filters.artist && it.artist !== filters.artist) return false;
    return true;
  });
}

function buildFilters(){
  const types = [...new Set(items.map(i=>i.type))].filter(Boolean).sort();
  const statuses = [...new Set(items.map(i=>i.status))].filter(Boolean).sort();
  const cls = [...new Set(items.map(i=>i.cl))].filter(Boolean).sort();
  const artists = [...new Set(items.map(i=>i.artist))].filter(Boolean).sort();

  const typeDiv = document.getElementById('type-filters');
  typeDiv.innerHTML = '<span class="filter-label">Type</span>';
  types.forEach(t=>{
    const p = document.createElement('button');
    p.className = 'pill' + (filters.type===t?' active-type-'+(TYPE_MAP[t]||'action'):'');
    p.textContent = t === 'Discussed in the Room' ? 'Decided' : t;
    p.onclick = ()=>{ filters.type = filters.type===t?null:t; render(); };
    typeDiv.appendChild(p);
  });

  const statusDiv = document.getElementById('status-filters');
  statusDiv.innerHTML = '<span class="filter-label">Status</span>';
  statuses.forEach(s=>{
    const p = document.createElement('button');
    p.className = 'pill'+(filters.status===s?' active':'');
    p.textContent = s;
    p.onclick = ()=>{ filters.status = filters.status===s?null:s; render(); };
    statusDiv.appendChild(p);
  });

  const clDiv = document.getElementById('cl-filters');
  clDiv.innerHTML = '<span class="filter-label">Lead</span>';
  cls.forEach(c=>{
    const p = document.createElement('button');
    p.className = 'pill'+(filters.cl===c?' active':'');
    p.textContent = c.split(' ')[0];
    p.onclick = ()=>{ filters.cl = filters.cl===c?null:c; render(); };
    clDiv.appendChild(p);
  });

  // Artist dropdown instead of pills (too many)
  const artDiv = document.getElementById('artist-filters');
  artDiv.innerHTML = '<span class="filter-label">Artist</span>';
  const sel = document.createElement('select');
  sel.className = 'edit-select';
  sel.innerHTML = '<option value="">All Artists</option>' + artists.map(a=>`<option value="${a}"${filters.artist===a?' selected':''}>${a}</option>`).join('');
  sel.onchange = ()=>{ filters.artist = sel.value||null; render(); };
  artDiv.appendChild(sel);
}

function buildStats(){
  const vis = getFilteredItems();
  const byType = (t)=>vis.filter(i=>i.type===t).length;
  const byStatus = (s)=>vis.filter(i=>i.status===s).length;
  document.getElementById('stats').innerHTML = `
    <div class="stat s-total"><strong>${vis.length}</strong>showing</div>
    <div class="stat s-decided"><strong>${byType('Discussed in the Room')}</strong>decided</div>
    <div class="stat s-action"><strong>${byType('Action')}</strong>actions</div>
    <div class="stat s-esc"><strong>${byType('Escalation')}</strong>escalations</div>
    <div class="stat s-signal"><strong>${byType('Signal')}</strong>signals</div>
    <div class="stat s-carry"><strong>${byType('Carry-Forward')}</strong>carry-fwd</div>
    <div class="stat" style="margin-left:16px"><strong class="status-open">${byStatus('Open')}</strong>open</div>
    <div class="stat"><strong class="status-progress">${byStatus('In Progress')}</strong>in progress</div>
    <div class="stat"><strong class="status-complete">${byStatus('Complete')+byStatus('Done')}</strong>complete</div>
  `;
}

function buildHeader(){
  const thead = document.getElementById('thead');
  thead.innerHTML = '<tr>' + COLS.map(c=>{
    const sorted = sortCol===c.key;
    const arrow = sorted ? (sortDir==='asc'?'▲':'▼') : '▲';
    return `<th class="${sorted?'sorted':''}" style="width:${c.w}" onclick="sortBy('${c.key}')">${c.label}<span class="sort-arrow">${arrow}</span></th>`;
  }).join('') + '<th style="width:40px"></th></tr>';
}

function buildRows(){
  let vis = getFilteredItems();
  if(sortCol){
    vis.sort((a,b)=>{
      const av = (a[sortCol]||'').toLowerCase();
      const bv = (b[sortCol]||'').toLowerCase();
      return sortDir==='asc' ? av.localeCompare(bv) : bv.localeCompare(av);
    });
  }
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = vis.map(it=>{
    const typeClass = TYPE_MAP[it.type]||'';
    const statusClass = STATUS_MAP[it.status]||'';
    const rowClass = it.type==='Escalation'?'row-escalation':it.type==='Carry-Forward'?'row-carry':'';
    const urgClass = it.timing==='ASAP'?'urg-asap':it.timing==='This Week'?'urg-week':it.timing==='Ongoing'?'urg-ongoing':'';

    return `<tr class="${rowClass}" data-id="${it._id}">
      <td><span class="type-badge type-${typeClass}">${it.type==='Discussed in the Room'?'Decided':it.type}</span></td>
      <td class="col-action" contenteditable="true" data-key="action">${esc(it.action)}</td>
      <td><select class="edit-select" data-key="status" onchange="updateField(${it._id},'status',this.value)">
        ${['Open','In Progress','Complete','Done'].map(s=>`<option${it.status===s?' selected':''}>${s}</option>`).join('')}
      </select></td>
      <td><select class="edit-select" data-key="timing" onchange="updateField(${it._id},'timing',this.value)">
        ${['','ASAP','This Week','Ongoing'].map(s=>`<option value="${s}"${it.timing===s?' selected':''}>${s||'—'}</option>`).join('')}
      </select></td>
      <td contenteditable="true" data-key="artist">${esc(it.artist)}</td>
      <td contenteditable="true" data-key="cl">${esc(it.cl)}</td>
      <td contenteditable="true" data-key="owner">${esc(it.owner)}</td>
      <td contenteditable="true" data-key="dept">${esc(it.dept)}</td>
      <td>${esc(it.source)}</td>
      <td>${esc(it.meetingDate)}</td>
      <td contenteditable="true" data-key="notes">${esc(it.notes)}</td>
      <td style="font-size:11px;color:var(--fog);white-space:nowrap">${esc(it.lastModified)}</td>
      <td><button style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px" onclick="deleteRow(${it._id})" title="Delete">×</button></td>
    </tr>`;
  }).join('');

  // Attach blur handlers for contenteditable
  tbody.querySelectorAll('[contenteditable]').forEach(el=>{
    el.addEventListener('blur', function(){
      const id = parseInt(this.closest('tr').dataset.id);
      const key = this.dataset.key;
      updateField(id, key, this.textContent.trim());
    });
  });

  document.getElementById('item-count').textContent = vis.length;
}

function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function updateField(id, key, val){
  const item = items.find(i=>i._id===id);
  if(item) item[key] = val;
  buildStats();
}

function sortBy(col){
  if(sortCol===col) sortDir = sortDir==='asc'?'desc':'asc';
  else { sortCol=col; sortDir='asc'; }
  render();
}

function addRow(){
  const newId = items.length ? Math.max(...items.map(i=>i._id))+1 : 0;
  items.push({_id:newId, id:items.length+1, action:'', type:'Action', status:'Open', timing:'', artist:'', cl:'', owner:'', dept:'', source:'Active Projects', meetingDate:'4/8/2026', notes:''});
  render();
  // Scroll to bottom
  const tbody = document.getElementById('tbody');
  tbody.lastElementChild?.scrollIntoView({behavior:'smooth'});
}

function deleteRow(id){
  items = items.filter(i=>i._id!==id);
  render();
}

function render(){
  buildFilters();
  buildStats();
  buildHeader();
  buildRows();
}

// EXPORT
function exportCSV(){
  const vis = getFilteredItems();
  const headers = COLS.map(c=>c.label);
  const rows = vis.map(it=>COLS.map(c=>{
    let v = it[c.key]||'';
    if(v.includes(',') || v.includes('"') || v.includes('\n')) v = '"'+v.replace(/"/g,'""')+'"';
    return v;
  }));
  const csv = [headers.join(','), ...rows.map(r=>r.join(','))].join('\n');
  modalData = {content:csv, filename:'Action_Items_'+new Date().toISOString().slice(0,10)+'.csv'};
  document.getElementById('modal-title').textContent = 'Export CSV';
  document.getElementById('modal-content').textContent = csv;
  document.getElementById('modal').classList.add('show');
}

function exportJSON(){
  const vis = getFilteredItems();
  const clean = vis.map(it=>{
    const o = {};
    COLS.forEach(c=>o[c.label]=it[c.key]||'');
    return o;
  });
  const json = JSON.stringify(clean, null, 2);
  modalData = {content:json, filename:'Action_Items_'+new Date().toISOString().slice(0,10)+'.json'};
  document.getElementById('modal-title').textContent = 'Export JSON';
  document.getElementById('modal-content').textContent = json;
  document.getElementById('modal').classList.add('show');
}

function copyMarkdown(){
  const vis = getFilteredItems();
  const byArtist = {};
  vis.forEach(it=>{
    const a = it.artist || 'No Artist';
    if(!byArtist[a]) byArtist[a] = [];
    byArtist[a].push(it);
  });
  let md = '# Action Items — Campaign Ops\n\n';
  Object.keys(byArtist).sort().forEach(artist=>{
    md += `## ${artist}\n`;
    byArtist[artist].forEach(it=>{
      const tag = it.type==='Discussed in the Room'?'DECIDED':it.type.toUpperCase();
      const status = it.status ? ` [${it.status}]` : '';
      const owner = it.owner ? ` → ${it.owner}` : '';
      const timing = it.timing ? ` (${it.timing})` : '';
      md += `- **${tag}**${status}${timing}: ${it.action}${owner}\n`;
      if(it.notes) md += `  - _${it.notes}_\n`;
    });
    md += '\n';
  });
  modalData = {content:md, filename:'Action_Items_'+new Date().toISOString().slice(0,10)+'.md'};
  document.getElementById('modal-title').textContent = 'Markdown Export';
  document.getElementById('modal-content').textContent = md;
  document.getElementById('modal').classList.add('show');
}

function copyModalContent(){
  navigator.clipboard.writeText(modalData.content).then(()=>{
    const btn = document.querySelector('.modal-btn.primary');
    btn.textContent = '✓ Copied';
    setTimeout(()=>btn.textContent='Copy to Clipboard', 1500);
  });
}

function downloadModal(){
  const blob = new Blob([modalData.content], {type:'text/plain'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = modalData.filename;
  a.click();
}

function closeModal(){
  document.getElementById('modal').classList.remove('show');
}

document.getElementById('modal').addEventListener('click', function(e){
  if(e.target === this) closeModal();
});

render();
</script>
</body>
</html>
